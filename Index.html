<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tiếp Nhận Khiếu Nại & Phản Hồi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #1e3a8a; 
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #334155;
            --text-light: #64748b;
            --border-color: #cbd5e1;
            --focus-ring: #93c5fd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .header p {
            color: var(--text-light);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #1e293b;
        }

        label span {
            color: #ef4444; 
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: inherit;
            font-size: 15px;
            color: var(--text-color);
            transition: all 0.2s ease;
            background-color: #fff;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-hover);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        textarea {
            resize: vertical;
            min-height: 140px; 
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 24px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-light);
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .container {
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Hệ Thống Tiếp Nhận Khiếu Nại</h1>
            <p>Vui lòng điền đầy đủ thông tin. Ý kiến của bạn sẽ được gửi trực tiếp đến Ban quản lý để xử lý kịp thời.</p>
        </div>

        <!-- Đã tích hợp link Formspree của bạn vào đây -->
        <form action="https://formspree.io/f/mbdvaggy" method="POST">
            
            <div class="form-group">
                <label for="fullname">Họ và tên của bạn <span>*</span></label>
                <input type="text" id="fullname" name="Họ và Tên" placeholder="Ví dụ: Nguyễn Văn A" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Địa chỉ Email <span>*</span></label>
                    <input type="email" id="email" name="Email" placeholder="nguyenvana@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">Số điện thoại liên hệ <span>*</span></label>
                    <input type="tel" id="phone" name="Số điện thoại" placeholder="0912345678" required>
                </div>
            </div>

            <div class="form-group">
                <label for="category">Danh mục cần khiếu nại</label>
                <select id="category" name="Danh mục khiếu nại">
                    <option value="Chất lượng sản phẩm">Chất lượng sản phẩm</option>
                    <option value="Dịch vụ khách hàng">Dịch vụ khách hàng</option>
                    <option value="Thái độ phục vụ của nhân viên">Thái độ phục vụ của nhân viên</option>
                    <option value="Sự cố kỹ thuật / Hệ thống">Sự cố kỹ thuật / Hệ thống</option>
                    <option value="Vấn đề khác">Vấn đề khác</option>
                </select>
            </div>

            <div class="form-group">
                <label for="title">Tiêu đề thư khiếu nại <span>*</span></label>
                <input type="text" id="title" name="Tiêu đề" placeholder="Tóm tắt ngắn gọn nội dung cần khiếu nại" required>
            </div>

            <div class="form-group">
                <label for="message">Nội dung khiếu nại chi tiết <span>*</span></label>
                <textarea id="message" name="Nội dung chi tiết" placeholder="Vui lòng mô tả chi tiết sự việc, thời gian, địa điểm hoặc các chứng cứ liên quan..." required></textarea>
            </div>

            <input type="text" name="_gotcha" style="display:none">

            <button type="submit" class="btn-submit">Gửi Thư Khiếu Nại</button>
        </form>

        <div class="footer-text">
            © Hệ thống tiếp nhận thông tin bảo mật tuyệt đối.
        </div>
    </div>

</body>
  </html>
